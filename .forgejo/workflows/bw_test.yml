name: bw test
on:
  push:
    paths:
      - 'bundlewrap/**'
      - 'common/**'
      - '.forgejo/workflows/**'
  pull_request:
    paths:
      - 'bundlewrap/**'
      - 'common/**'
      - '.forgejo/workflows/**'

concurrency:
  group: deploy-${{ forgejo.ref }}
  cancel-in-progress: true

enable-email-notifications: true

jobs:
  bw_test_dummy_mode:
    name: 'bw test (with dummy mode)'
    runs-on: ubuntu-latest
    container:
      image: python:3
    steps:
      - name: Bootstrap CI Tools
        run: |
          apt update
          apt -y install nodejs
          pip install --upgrade pip
      - uses: actions/checkout@v6
      - name: Install Dependencies
        run: pip3 install -r requirements.txt
        working-directory: bundlewrap
      - name: Run bw test
        run: bw test
        working-directory: bundlewrap
    env:
      BW_VAULT_DUMMY_MODE: '1'

  bw_test_ignore:
    name: 'bw test -i'
    runs-on: ubuntu-latest
    container:
      image: python:3
    steps:
      - name: Bootstrap CI Tools
        run: |
          apt update
          apt -y install nodejs
          pip install --upgrade pip
      - uses: actions/checkout@v6
      - name: Install Dependencies
        run: pip3 install -r requirements.txt
        working-directory: bundlewrap
      - name: Run bw test
        run: bw test -i
        working-directory: bundlewrap
