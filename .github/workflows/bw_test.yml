name: bw test
on:
  push:
    paths:
      - 'bundlewrap/**'
      - 'common/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'bundlewrap/**'
      - 'common/**'
      - '.github/workflows/**'

jobs:
  bw_test_dummy_mode:
    name: 'bw test (with dummy mode)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.3
      - name: Install Dependencies
        run: pip3 install -r requirements.txt
        working-directory: bundlewrap
      - name: Run bw test
        run: bw test
        working-directory: bundlewrap
    env:
      BW_VAULT_DUMMY_MODE: '1'

  bw_test_ignore:
    name: 'bw test -i'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.3
      - name: Install Dependencies
        run: pip3 install -r requirements.txt
        working-directory: bundlewrap
      - name: Run bw test
        run: bw test -i
        working-directory: bundlewrap
    env:
      BW_VAULT_DUMMY_MODE: '1'
